syntax = "proto3";
package tfchain4.tfchain4;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "tfchain4/tfchain4/params.proto";

option go_package = "tfchain4/x/tfchain4/types";

// GenesisState defines the tfchain4 module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
